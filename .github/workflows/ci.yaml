# Minimum viable CI for RAS-Wireless-Agent
# Runs on every push and PR to main.
#
# Stages:
#   1. Lint   - ruff (pyflakes: catch undefined names, redefinitions)
#   2. Test   - pytest (unit tests, mocked, no live hardware)
#   3. Guard  - ci_guard_no_local_wifi.py (safety: no local wifi in orchestrator)
#   4. Schema - validate_profiles.py (YAML profile schema check)
#
# NOTE: smoke_labview_compat.py is excluded because it imports pyautogui/pywin32
# which require a Windows GUI environment. It remains a local pre-flight check.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install ruff
      - run: ruff check . --select F --ignore F401,F841

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt pytest pytest-asyncio
      - run: python -m pytest tests/ -v --tb=short

  ci-guard:
    name: Safety Guard (no local WiFi)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: python scripts/ci_guard_no_local_wifi.py

  validate-profiles:
    name: Profile Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt
      - run: python scripts/validate_profiles.py --all
