name: "2-PC Channel Sweep: All Bands"
description: >
  Multi-band channel sweep with a single worker (192.168.22.203 / Intel BE200).
  Auto-detects available bands from the router GUI and iterates over each
  (band, channel) combination running the full E2E pipeline per iteration.

router:
  base_url: http://192.168.1.1
  router_control_url: http://192.168.22.100:8081

workers:
  - url: "http://192.168.22.203:8080"
    name: worker-203

sweep:
  base_ssid: RFLabTest
  password: password
  target_ping_ip: "192.168.1.1"
  continue_on_failure: true

  channels:
    "2.4G": [1, 6, 11]
    "5G": [36, 40, 44, 48]
    "6G": [5, 37, 69]

  scan_timeout_sec: 120
  scan_poll_interval_sec: 10
  ping_count: 4
  ping_timeout_sec: 10

  automation_enabled: false
  automation:
    command: "echo"
    args: ["noop"]
    timeout_sec: 10
